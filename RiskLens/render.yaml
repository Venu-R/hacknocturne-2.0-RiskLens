services:
  - type: web
    name: risklens-backend
    runtime: python
    rootDir: RiskLens/backend
    buildCommand: pip install -r requirements.txt && cd ../frontend && npm install && npm run build
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false
      - key: FLASK_DEBUG
        value: "0"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: JIRA_CLIENT_ID
        sync: false
      - key: JIRA_CLIENT_SECRET
        sync: false
      - key: JIRA_REDIRECT_URI
        sync: false
      - key: JIRA_OAUTH_SCOPES
        value: read:me
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SLACK_CHANNEL_NAME
        value: "#alerts"
      - key: SLACK_ALERT_THRESHOLD
        value: "75"
